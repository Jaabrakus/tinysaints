name: Core Studio validation

on:
  workflow_dispatch:
  push:
    branches:
      - "make-room/proposal-*"

permissions:
  contents: read

concurrency:
  group: core-studio-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - run: npm ci
      - run: npm test
